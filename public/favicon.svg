<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Peinture Laval favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1b3e"/>
      <stop offset="1" stop-color="#060d24"/>
    </linearGradient>
    <linearGradient id="sweep" x1="8" y1="56" x2="54" y2="8" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d4ed8"/>
      <stop offset="0.55" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="handle" x1="42" y1="10" x2="56" y2="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- Bold paint stroke (bottom-left → upper-right) -->
  <path d="M9 53 C16 45 23 38 31 30 C38 23 45 17 53 11"
        stroke="url(#sweep)" stroke-width="11" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Highlight shimmer on stroke -->
  <path d="M11 51 C18 43 25 36 33 28 C40 21 47 15 54 10"
        stroke="rgba(255,255,255,0.18)" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Brush handle -->
  <rect x="49" y="7" width="5" height="14" rx="2.5" transform="rotate(45 51.5 14)" fill="url(#handle)"/>

  <!-- Brush ferrule (metal band) -->
  <rect x="47.5" y="13.5" width="8" height="3.5" rx="1" transform="rotate(45 51.5 15.25)" fill="#cbd5e1"/>

  <!-- Paint drip at stroke start -->
  <ellipse cx="9.5" cy="53.5" rx="5" ry="5.5" fill="#1d4ed8" opacity="0.5"/>
  <ellipse cx="9.5" cy="53.5" rx="2.5" ry="3" fill="#60a5fa" opacity="0.7"/>
</svg>
